<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil — Sala de PandaCoins · Exilium</title>
<meta name="description" content="Tu perfil de la Sala de PandaCoins: saldo, estadísticas, ranking e historial.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cinzel+Decorative:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  :root{
    --gold:#f0a52e; --gold-pale:#f3e6c4; --ink:#f3ead6; --ink-dim:#b08d57;
    --green:#54d18a; --red:#cf6a64; --bg:#0a0a0c;
    --card:linear-gradient(180deg,rgba(22,16,12,.86),rgba(12,9,7,.9));
    --border:rgba(240,165,46,.22);
  }
  html,body{ background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh; }
  body{
    background:
      radial-gradient(ellipse at 50% 0%, rgba(240,165,46,.10), transparent 55%),
      radial-gradient(ellipse at 50% 120%, rgba(139,0,0,.16), transparent 60%),
      url(assets/fondo-casino.png) center/cover no-repeat fixed, var(--bg);
    padding:clamp(14px,3vw,40px);
  }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:980px; margin:0 auto; }
  /* Header */
  header{ display:flex; align-items:center; gap:16px; margin-bottom:22px; }
  header .logo{ width:54px; height:54px; flex-shrink:0; border-radius:13px; background:linear-gradient(150deg,#1c150f,#0c0a08); border:1.5px solid rgba(240,165,46,.4); box-shadow:0 0 22px -6px rgba(240,165,46,.5); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  header .logo img{ width:100%; height:100%; object-fit:contain; }
  header .eyebrow{ font-size:11px; letter-spacing:.34em; color:var(--ink-dim); text-transform:uppercase; font-weight:600; }
  header h1{ font-family:'Cinzel Decorative',serif; font-weight:700; font-size:clamp(20px,2.4vw,30px); color:var(--gold-pale); text-transform:uppercase; text-shadow:0 0 24px rgba(240,165,46,.35); }
  header .back{ margin-left:auto; padding:9px 16px; border-radius:999px; border:1.5px solid var(--border); background:rgba(20,14,10,.8); color:var(--gold); font-weight:700; font-size:12px; }
  header .back:hover{ background:rgba(240,165,46,.14); }
  /* Cards */
  .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; box-shadow:0 20px 50px -22px rgba(0,0,0,.8); padding:20px; }
  .h-card{ display:flex; align-items:center; gap:18px; margin-bottom:18px; flex-wrap:wrap; }
  .avatar{ width:72px; height:72px; border-radius:50%; border:3px solid var(--gold); box-shadow:0 0 0 3px rgba(240,165,46,.25),0 0 18px rgba(240,165,46,.4); object-fit:cover; background:linear-gradient(150deg,#5865F2,#404EED); display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-weight:800; font-size:30px; color:#fff; }
  .who .name{ font-family:'Cinzel',serif; font-weight:700; font-size:24px; color:var(--gold-pale); }
  .who .tag{ font-size:12px; color:var(--ink-dim); margin-top:2px; }
  .balance{ margin-left:auto; text-align:right; }
  .balance .lbl{ font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-dim); }
  .balance .val{ font-family:'Cinzel',serif; font-weight:800; font-size:34px; color:var(--ink); font-variant-numeric:tabular-nums; }
  .balance .val span{ color:var(--gold); font-size:.55em; }
  /* Stats grid */
  .stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:18px; }
  .stat{ background:rgba(0,0,0,.3); border:1px solid rgba(240,165,46,.14); border-radius:11px; padding:13px; text-align:center; }
  .stat .lbl{ display:block; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:5px; }
  .stat .num{ font-family:'Cinzel',serif; font-weight:700; font-size:21px; font-variant-numeric:tabular-nums; }
  /* Section title */
  .sect-title{ display:flex; align-items:center; gap:8px; font-family:'Cinzel',serif; font-weight:600; font-size:14px; letter-spacing:.12em; text-transform:uppercase; color:#e9d4a0; margin-bottom:12px; }
  .sect-title span.dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 9px var(--gold); }
  /* Table */
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{ text-align:left; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-dim); padding:8px 10px; border-bottom:1px solid var(--border); font-weight:600; }
  tbody td{ padding:9px 10px; border-bottom:1px solid rgba(240,165,46,.08); }
  tbody tr:hover{ background:rgba(240,165,46,.05); }
  .badge{ display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; background:rgba(240,165,46,.12); border:1px solid var(--border); color:#e9d4a0; }
  .empty{ text-align:center; color:var(--ink-dim); padding:26px; }
  .mt{ margin-top:18px; }
  /* Logged-out / loading / error */
  .center-box{ max-width:440px; margin:8vh auto 0; text-align:center; }
  .center-box .coin{ width:64px; height:64px; margin:0 auto 16px; }
  .btn-discord{ display:inline-flex; align-items:center; gap:9px; padding:11px 22px; border-radius:24px; border:none; background:linear-gradient(150deg,#5865F2,#4752C4); color:#fff; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 4px 14px rgba(88,101,242,.45); margin-top:14px; font-family:'Inter',sans-serif; }
  .muted{ color:var(--ink-dim); font-size:13px; line-height:1.6; }
  @media(max-width:560px){ .balance{ margin-left:0; text-align:left; width:100%; } }
  /* ── Decoraciones de la tienda (mismas clases que la Sala) ── */
  .df-gold{ border-color:#f0a52e!important; animation:dfGold 1.8s ease-in-out infinite; }
  @keyframes dfGold{ 0%,100%{ box-shadow:0 0 0 2px #f0a52e,0 0 10px rgba(240,165,46,.7),0 0 22px rgba(240,165,46,.4); } 50%{ box-shadow:0 0 0 3px #ffd98a,0 0 18px rgba(255,200,90,1),0 0 36px rgba(240,165,46,.7); } }
  .df-emerald{ border-color:#54d18a!important; animation:dfEmerald 1.8s ease-in-out infinite; }
  @keyframes dfEmerald{ 0%,100%{ box-shadow:0 0 0 2px #2f9c63,0 0 10px rgba(84,209,138,.7),0 0 22px rgba(47,156,99,.4); } 50%{ box-shadow:0 0 0 3px #9fffd0,0 0 18px rgba(120,255,180,1),0 0 36px rgba(84,209,138,.7); } }
  .df-flame{ border-color:#ff6a00!important; animation:dfFlame .85s ease-in-out infinite; }
  @keyframes dfFlame{ 0%,100%{ box-shadow:0 0 0 2px #ff6a00,0 -2px 12px 2px rgba(255,60,0,.9),0 0 18px 4px rgba(255,140,0,.85),0 0 32px 8px rgba(255,80,0,.45); } 50%{ box-shadow:0 0 0 3px #ffb000,0 -3px 18px 3px rgba(255,120,0,1),0 0 26px 6px rgba(255,205,40,.95),0 0 46px 11px rgba(255,90,0,.55); } }
  .df-ice{ border-color:#7ec8ff!important; animation:dfIce 1.5s ease-in-out infinite; }
  @keyframes dfIce{ 0%,100%{ box-shadow:0 0 0 2px #7ec8ff,0 0 12px rgba(126,200,255,.8),0 0 26px rgba(126,200,255,.45); } 50%{ box-shadow:0 0 0 3px #eaf7ff,0 0 22px rgba(210,240,255,1),0 0 42px rgba(150,210,255,.7); } }
  .df-dragon{ border-color:#b51a1a!important; animation:dfDragon 1.6s ease-in-out infinite; }
  @keyframes dfDragon{ 0%,100%{ box-shadow:0 0 0 2px #b51a1a,0 0 14px 2px rgba(181,26,26,.9),0 0 30px 6px rgba(240,165,46,.5); } 50%{ box-shadow:0 0 0 4px #f0a52e,0 0 24px 5px rgba(240,165,46,1),0 0 48px 11px rgba(181,26,26,.7); } }
  .ne-gold{ background:linear-gradient(90deg,#f7c168,#fff0c0,#f0a52e); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent!important; }
  .ne-fire{ background:linear-gradient(90deg,#ff3d00,#ffb000,#ff3d00); background-size:200% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent!important; animation:neSlide 2s linear infinite; }
  .ne-rainbow{ background:linear-gradient(90deg,#ff3d3d,#ffb000,#54d18a,#3fc7eb,#8788ee,#ff3d3d); background-size:300% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent!important; animation:neSlide 3s linear infinite; }
  @keyframes neSlide{ to{ background-position:300% center; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><img src="assets/logo.png" alt="Exilium"></div>
    <div>
      <div class="eyebrow">Exilium · Quel'Thalas</div>
      <h1>Mi Perfil</h1>
    </div>
    <a class="back" href="sala-pandacoins-standalone.html">← Volver a la Sala</a>
  </header>

  <div id="content"><div class="center-box"><p class="muted">Cargando tu perfil…</p></div></div>
</div>

<script>
const API = 'https://api.guild-exilium.com';

function tk(){ try{ return localStorage.getItem('exi_tk') || ''; }catch(e){ return ''; } }
function fmt(n){ return Number(n||0).toLocaleString('es'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const DECO_CLASS={ frame_gold:'df-gold', frame_emerald:'df-emerald', frame_flame:'df-flame', frame_ice:'df-ice', frame_dragon:'df-dragon', name_gold:'ne-gold', name_fire:'ne-fire', name_rainbow:'ne-rainbow' };
function decoClass(id){ return (id&&DECO_CLASS[id])||''; }

// Si volvemos del OAuth con ?token=..., guardarlo (defensivo; el callback suele ir a la Sala)
(function captureToken(){
  try{
    const q = new URLSearchParams(location.search);
    const t = q.get('token');
    if(t){ localStorage.setItem('exi_tk', t); localStorage.setItem('exi_nm', q.get('name')||''); localStorage.setItem('exi_av', q.get('avatar')||''); history.replaceState({},'',location.pathname); }
  }catch(e){}
})();

async function api(path){
  const headers = {};
  const t = tk(); if(t) headers['Authorization'] = 'Bearer ' + t;
  const res = await fetch(API + path, { headers });
  let data = null; try{ data = await res.json(); }catch(e){}
  if(res.status === 401){ try{ localStorage.removeItem('exi_tk'); }catch(e){} }
  return { ok: res.ok, status: res.status, data: data || {} };
}

function loggedOut(){
  document.getElementById('content').innerHTML =
    '<div class="center-box card">' +
      '<img class="coin" src="assets/coin_3.png" alt="">' +
      '<h2 style="font-family:\'Cinzel\',serif;color:var(--gold);font-size:22px;margin-bottom:8px;">Entra para ver tu perfil</h2>' +
      '<p class="muted">Inicia sesión con Discord para ver tu saldo, estadísticas, ranking e historial de PandaCoins.</p>' +
      '<button class="btn-discord" id="login-btn"><span>🎮</span> Entrar con Discord</button>' +
    '</div>';
  document.getElementById('login-btn').onclick = function(){
    location.href = API + '/api/casino/auth/discord?redirect=' + encodeURIComponent(location.origin + '/sala-pandacoins-standalone.html');
  };
}

function errorBox(msg){
  document.getElementById('content').innerHTML =
    '<div class="center-box card"><p class="muted">' + esc(msg) + '</p>' +
    '<a class="btn-discord" href="sala-pandacoins-standalone.html" style="text-decoration:none;">← Volver a la Sala</a></div>';
}

const TX_LABEL = {
  round_payout: '🎰 Ronda', admin_adjust: '⚙️ Ajuste admin',
  stand_refund: '↩️ Reembolso', kick_refund: '↩️ Reembolso (kick)',
};
const BET_LABEL = {
  'color:red':'Rojo','color:black':'Negro','parity:even':'Par','parity:odd':'Impar',
  'half:low':'1–18','half:high':'19–36','dozen:1':'1ª docena','dozen:2':'2ª docena','dozen:3':'3ª docena',
  'col:1':'Columna 1','col:2':'Columna 2','col:3':'Columna 3',
};
function betLabel(k){ if(!k) return ''; if(k.startsWith('number:')) return 'Pleno '+k.split(':')[1]; return BET_LABEL[k]||k; }

function render(user, txs, rank){
  // Derivar ganadas/perdidas desde transacciones de ronda
  let wins=0, losses=0;
  for(const t of txs){ if(t.type==='round_payout'){ ((t.win||0)>0) ? wins++ : losses++; } }
  const net = (user.total_won||0) - (user.total_bet||0);
  const netColor = net>0?'var(--green)':(net<0?'var(--red)':'var(--ink)');
  const rtp = user.total_bet>0 ? Math.round((user.total_won/user.total_bet)*1000)/10 : 0;
  const winRate = (wins+losses)>0 ? Math.round((wins/(wins+losses))*100) : 0;
  const initial = (user.name||'?').charAt(0).toUpperCase();
  const eq = user.equipped || {};
  const eqImg = user.equipped_images || {};
  const frameImg = eqImg.avatar_frame;
  const frameCls = frameImg ? '' : decoClass(eq.avatar_frame);
  const avInner = user.avatar_url
    ? '<img class="avatar '+frameCls+'" src="'+esc(user.avatar_url)+'" alt="">'
    : '<div class="avatar '+frameCls+'">'+esc(initial)+'</div>';
  const avatar = frameImg
    ? '<span style="position:relative; display:inline-flex; overflow:visible;"><img src="'+esc(frameImg)+'" alt="" style="position:absolute; left:50%; top:48%; transform:translate(-50%,-50%); width:330%; height:330%; pointer-events:none; object-fit:contain; z-index:0;"><span style="position:relative; z-index:1; display:inline-flex;">'+avInner+'</span></span>'
    : avInner;

  const rows = txs.length ? txs.map(t=>{
    let amount='', color='var(--ink-dim)', detail='';
    if(t.type==='round_payout'){
      const won=(t.win||0)>0;
      amount=(won?'+':'')+fmt(t.payout!=null?t.payout:(t.win||0))+' ₡';
      color=won?'var(--green)':'var(--red)';
      detail='Apostado '+fmt(t.bet||0)+' · Resultado '+(t.result!=null?t.result:'—');
    } else if(t.type==='admin_adjust'){
      amount=((t.delta||0)>=0?'+':'')+fmt(t.delta||0)+' ₡'; color=(t.delta||0)>=0?'var(--green)':'var(--red)';
      detail=esc(t.reason||'Sin motivo');
    } else {
      amount='+'+fmt(t.refund||0)+' ₡'; color='var(--green)'; detail='Reembolso de apuesta';
    }
    const when = t.ts ? new Date(t.ts).toLocaleString('es',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
    return '<tr><td><span class="badge">'+(TX_LABEL[t.type]||esc(t.type))+'</span></td>'+
      '<td style="color:'+color+';font-weight:700;font-variant-numeric:tabular-nums;">'+amount+'</td>'+
      '<td style="color:var(--ink-dim);font-size:12px;">'+detail+'</td>'+
      '<td style="font-variant-numeric:tabular-nums;">'+(t.balance_after!=null?fmt(t.balance_after)+' ₡':'—')+'</td>'+
      '<td style="color:var(--ink-dim);font-size:12px;">'+when+'</td></tr>';
  }).join('') : '<tr><td colspan="5" class="empty">Aún no tienes movimientos. ¡Ve a la Sala y haz tu primera apuesta!</td></tr>';

  document.getElementById('content').innerHTML =
    '<div class="card">' +
      '<div class="h-card">' + avatar +
        '<div class="who"><div class="name '+decoClass(eq.name_effect)+'">'+esc(user.name)+'</div>'+
          (user.discord_username?'<div class="tag">@'+esc(user.discord_username)+'</div>':'')+'</div>'+
        '<div class="balance"><div class="lbl">Saldo · PandaCoins</div>'+
          '<div class="val">'+fmt(user.balance)+' <span>₡</span></div></div>'+
      '</div>'+
      '<div class="stats">'+
        '<div class="stat"><span class="lbl">Total apostado</span><span class="num">'+fmt(user.total_bet)+'</span></div>'+
        '<div class="stat"><span class="lbl">Total ganado</span><span class="num" style="color:var(--green);">'+fmt(user.total_won)+'</span></div>'+
        '<div class="stat"><span class="lbl">Neto</span><span class="num" style="color:'+netColor+';">'+(net>0?'+':(net<0?'−':''))+fmt(Math.abs(net))+'</span></div>'+
        '<div class="stat"><span class="lbl">Rondas</span><span class="num">'+fmt(user.rounds_played)+'</span></div>'+
        '<div class="stat"><span class="lbl">Ganadas</span><span class="num" style="color:var(--green);">'+wins+'</span></div>'+
        '<div class="stat"><span class="lbl">Perdidas</span><span class="num" style="color:var(--red);">'+losses+'</span></div>'+
        '<div class="stat"><span class="lbl">Win rate</span><span class="num">'+winRate+'%</span></div>'+
        '<div class="stat"><span class="lbl">RTP personal</span><span class="num">'+rtp+'%</span></div>'+
        '<div class="stat"><span class="lbl">Ranking</span><span class="num" style="color:var(--gold);">'+(rank?('#'+rank):'—')+'</span></div>'+
      '</div>'+
    '</div>'+
    '<div class="card mt">'+
      '<div class="sect-title"><span class="dot"></span>Historial de movimientos</div>'+
      '<div style="overflow:auto;max-height:50vh;">'+
        '<table><thead><tr><th>Tipo</th><th>Cantidad</th><th>Detalle</th><th>Saldo tras</th><th>Fecha</th></tr></thead>'+
        '<tbody>'+rows+'</tbody></table>'+
      '</div>'+
    '</div>';
}

async function load(){
  if(!tk()){ loggedOut(); return; }
  const me = await api('/api/casino/me');
  if(me.status === 401){ loggedOut(); return; }
  if(!me.ok || !me.data.user){ errorBox((me.data && me.data.error) || 'No se pudo cargar tu perfil.'); return; }
  const user = me.data.user;
  // En paralelo: historial + ranking
  const [txRes, lbRes] = await Promise.all([
    api('/api/casino/my-transactions'),
    api('/api/casino/leaderboard'),
  ]);
  const txs = (txRes.ok && Array.isArray(txRes.data.transactions)) ? txRes.data.transactions : [];
  let rank = null;
  if(lbRes.ok && Array.isArray(lbRes.data.leaderboard)){
    const idx = lbRes.data.leaderboard.findIndex(u => u.id === user.id);
    if(idx >= 0) rank = idx + 1;
  }
  render(user, txs, rank);
}

load();
</script>
</body>
</html>
