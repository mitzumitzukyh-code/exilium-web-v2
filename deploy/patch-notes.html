<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patch Notes – Exilium PvP</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── Layout ── */
    .pn-hero {
      background: linear-gradient(180deg, #1a0a0a 0%, var(--dark-bg, #0D0D0D) 100%);
      border-bottom: 1px solid #C89B3C;
      padding: 48px 24px 32px;
      text-align: center;
    }
    .pn-hero h1 {
      font-family: 'Cinzel', serif;
      color: #F0D080;
      font-size: 2.2rem;
      letter-spacing: 0.1em;
      margin: 0 0 8px;
    }
    .pn-hero p {
      color: #8A7A5A;
      font-size: 0.9rem;
      margin: 0;
    }
    .pn-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 20px 24px;
      background: #1A1A1A;
      border-bottom: 1px solid #3A3A3A;
      max-width: 1100px;
      margin: 0 auto;
    }
    .pn-chip {
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid #3A3A3A;
      background: #242424;
      color: #8A7A5A;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .pn-chip:hover, .pn-chip.active {
      border-color: #C89B3C;
      color: #F0D080;
      background: rgba(200,155,60,0.1);
    }
    .pn-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    /* ── Cards ── */
    .pn-card {
      background: #1A1A1A;
      border: 1px solid #3A3A3A;
      border-left: 3px solid #C89B3C;
      border-radius: 6px;
      padding: 20px 24px;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .pn-card:hover { border-left-color: #F0D080; }
    .pn-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .pn-card-title {
      color: #F0D080;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .pn-card-meta {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pn-badge {
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pn-badge.patch  { background: rgba(200,155,60,0.2); color: #C89B3C; border: 1px solid #C89B3C; }
    .pn-badge.class  { background: rgba(139,0,0,0.3); color: #ff6b6b; border: 1px solid #8B0000; }
    .pn-badge.source { background: #242424; color: #8A7A5A; border: 1px solid #3A3A3A; }
    .pn-card-summary { color: #C0B090; font-size: 0.88rem; line-height: 1.6; }
    .pn-card-date { color: #8A7A5A; font-size: 0.75rem; margin-top: 10px; }
    .pn-card-link { color: #C89B3C; font-size: 0.78rem; text-decoration: none; }
    .pn-card-link:hover { color: #F0D080; text-decoration: underline; }
    /* ── Empty / Loading ── */
    .pn-empty {
      text-align: center;
      padding: 60px 20px;
      color: #8A7A5A;
    }
    .pn-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .pn-loading { text-align: center; padding: 40px; color: #8A7A5A; }
    /* ── Back link ── */
    .pn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #8A7A5A;
      text-decoration: none;
      font-size: 0.82rem;
      padding: 8px 0 0 24px;
    }
    .pn-back:hover { color: #C89B3C; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <a href="/" class="pn-back">← Volver al inicio</a>

  <div class="pn-hero">
    <h1>⚔️ Patch Notes PvP</h1>
    <p>Cambios de balance y actualizaciones PvP de World of Warcraft</p>
  </div>

  <div class="pn-filters" id="filterBar">
    <button class="pn-chip active" data-filter="all">Todos</button>
    <button class="pn-chip" data-filter="general">General</button>
    <button class="pn-chip" data-filter="warrior">Warrior</button>
    <button class="pn-chip" data-filter="mage">Mage</button>
    <button class="pn-chip" data-filter="priest">Priest</button>
    <button class="pn-chip" data-filter="druid">Druid</button>
    <button class="pn-chip" data-filter="hunter">Hunter</button>
    <button class="pn-chip" data-filter="rogue">Rogue</button>
    <button class="pn-chip" data-filter="shaman">Shaman</button>
    <button class="pn-chip" data-filter="warlock">Warlock</button>
    <button class="pn-chip" data-filter="paladin">Paladin</button>
    <button class="pn-chip" data-filter="monk">Monk</button>
    <button class="pn-chip" data-filter="demonhunter">DH</button>
    <button class="pn-chip" data-filter="deathknight">DK</button>
    <button class="pn-chip" data-filter="evoker">Evoker</button>
  </div>

  <div class="pn-container">
    <div id="newsList">
      <div class="pn-loading">Cargando noticias...</div>
    </div>
  </div>

  <script>
    // ── Config ──
    const API_BASE = 'https://api.guild-exilium.com';
    let allArticles = [];
    let activeFilter = 'all';

    async function loadNews() {
      try {
        const res = await fetch(`${API_BASE}/api/news`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allArticles = await res.json();
        render();
      } catch (err) {
        document.getElementById('newsList').innerHTML = `
          <div class="pn-empty">
            <div class="pn-empty-icon">⚠️</div>
            <div>Error al cargar las noticias. Intenta más tarde.</div>
          </div>`;
      }
    }

    function render() {
      const list = document.getElementById('newsList');
      const filtered = activeFilter === 'all'
        ? allArticles
        : allArticles.filter(a => a.class === activeFilter);

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="pn-empty">
            <div class="pn-empty-icon">🛡️</div>
            <div>No hay noticias en esta categoría todavía.</div>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(a => {
        const date = a.publishedAt
          ? new Date(a.publishedAt).toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' })
          : '';
        const classLabel = a.class === 'general' ? 'General' : capitalize(a.class);
        const sourceLogo = a.source === 'blizzard' ? '🔵 Blizzard' : '🔴 Wowhead';

        return `
          <div class="pn-card" data-class="${a.class}">
            <div class="pn-card-header">
              <div class="pn-card-title">${escHtml(a.title)}</div>
              <div class="pn-card-meta">
                ${a.patchVersion ? `<span class="pn-badge patch">v${escHtml(a.patchVersion)}</span>` : ''}
                <span class="pn-badge class">${escHtml(classLabel)}</span>
                <span class="pn-badge source">${sourceLogo}</span>
              </div>
            </div>
            <div class="pn-card-summary">${escHtml(a.summary)}</div>
            <div class="pn-card-date">
              ${date}
              ${a.sourceUrl ? ` · <a class="pn-card-link" href="${escHtml(a.sourceUrl)}" target="_blank" rel="noopener">Ver fuente original ↗</a>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('filterBar').addEventListener('click', e => {
      const chip = e.target.closest('.pn-chip');
      if (!chip) return;
      document.querySelectorAll('.pn-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      render();
    });

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function capitalize(str) {
      return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
    }

    loadNews();
  </script>
</body>
</html>
