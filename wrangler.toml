name = "exilium-blizzard"
main = "worker/index.js"
compatibility_date = "2024-01-01"

# Mantener la URL ...workers.dev activa (el frontend la sigue usando hasta la migración).
workers_dev = true

# Dominio propio de la API (la zona guild-exilium.com está en la cuenta de Cloudflare).
# El worker sigue accesible también por ...workers.dev.
routes = [
  { pattern = "api.guild-exilium.com", custom_domain = true }
]

[triggers]
crons = ["*/30 * * * *", "0 */6 * * *", "* * * * *"]

# Durable Object: mesa de ruleta en tiempo real (WebSockets, estado fuerte).
[[durable_objects.bindings]]
name = "CASINO_TABLE"
class_name = "CasinoTable"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CasinoTable"]

[[kv_namespaces]]
binding = "EXILIUM_KV"
id = "2d6d2badfc184b408f6c5af7e380d6be"

[[kv_namespaces]]
binding = "KV"
id = "2d6d2badfc184b408f6c5af7e380d6be"

[[r2_buckets]]
binding = "EXILIUM_MEDIA"
bucket_name = "exilium-media"

[ai]
binding = "AI"
